<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fef2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 3rem 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid #ef4444; }
        h1 { color: #991b1b; font-size: 1.5rem; }
        p { color: #4b5563; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Link Expired</h1>
        <p>This signing link is no longer valid. Please request a new document from the sender.</p>
    </div>
</body>
</html>
