<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ecfdf5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 3rem 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid #10b981; }
        h1 { color: #065f46; font-size: 1.5rem; }
        p { color: #4b5563; margin-bottom: 2rem; }
        .btn { background-color: #10b981; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn:hover { background-color: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Document Signed Successfully</h1>
        <p>Thank you for signing the document. You may now download a copy for your records.</p>
        <a href="/sign/download/{{ doc_id }}" class="btn">Download PDF</a>
    </div>
</body>
</html>
